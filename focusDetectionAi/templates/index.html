<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Focus Monitor Pro</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</head>

<body>

<div class="container">

    <div class="sidebar">

        <h1>🧠 Focus Monitor</h1>

        <div id="status" class="status">
            Loading...
        </div>

        <!-- ===================== -->
        <!-- METRICS -->
        <!-- ===================== -->

        <div class="metrics-grid">

            <div class="card">
                <h3>Attention</h3>
                <div class="attention-number">
                    <span id="attention">0</span>%
                </div>
            </div>

            <div class="card">
                <h3>Emotion</h3>
                <div class="big-text" id="emotion">-</div>
            </div>

            <div class="card">
                <h3>Focus Time</h3>
                <div class="big-text">
                    <span id="focusTime">0</span>s
                </div>
            </div>

            <div class="card">
                <h3>Away Time</h3>
                <div class="big-text">
                    <span id="awayTime">0</span>s
                </div>
            </div>

        </div>

        <!-- ===================== -->
        <!-- STATUS MESSAGE -->
        <!-- ===================== -->

        <div class="message-card">

            <h3>Status</h3>

            <div id="message">-</div>

        </div>

        <!-- ===================== -->
        <!-- ALERT SETTINGS -->
        <!-- ===================== -->

        <div class="message-card">

            <h3>🔔 Alert Settings</h3>

            <label>Alert me after</label>

            <select id="alertTime">

                <option value="30" selected>30 seconds</option>
                <option value="60">1 minute</option>
                <option value="300">5 minutes</option>
                <option value="600">10 minutes</option>
                <option value="custom">Custom</option>

            </select>

            <input
                type="number"
                id="customAlert"
                placeholder="Seconds"
                min="1"
            >

            <label class="checkbox-row">

                <input type="checkbox" id="enableAlert" checked>

                Enable sound alert

            </label>

            <div id="alertStatus" class="alert-status">
                🟢 Monitoring...
            </div>

        </div>

        <!-- ===================== -->
        <!-- SESSION CONTROL -->
        <!-- ===================== -->
        <div class="message-card">
            <h3>🎓 Session Control</h3>
            <div style="display: flex; gap: 8px;">
                <button id="startSessionBtn" onclick="startSession()" class="start-btn" style="flex: 1; padding: 12px 6px; font-size: 13px;">
                    ▶️ Start
                </button>
                <button id="endSessionBtn" onclick="endSession()" class="end-btn" style="flex: 1; padding: 12px 6px; font-size: 13px;" disabled>
                    ⏹ End
                </button>
            </div>
            <div id="sessionStatus" class="session-status" style="margin-top: 8px; font-size: 13px; text-align: center; color: #c7d0da;">
                No active session
            </div>
        </div>

        <!-- ===================== -->
        <!-- CONTROLS -->
        <!-- ===================== -->

        <button onclick="toggleCamera()">
            ⏸ Pause / Resume
        </button>

        <button onclick="resetStats()">
            🔄 Reset
        </button>

    </div>

    <div class="main">

        <img src="/video_feed" class="video">

        <!-- ===================== -->
        <!-- CHARTS -->
        <!-- ===================== -->

        <div class="charts-grid">

            <div class="chart-card">
                <canvas id="attentionChart"></canvas>
            </div>

            <div class="chart-card">
                <canvas id="emotionChart"></canvas>
            </div>

        </div>

    </div>

</div>

<!-- ===================== -->
<!-- SESSION REPORT MODAL -->
<!-- ===================== -->
<div id="reportModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeReport()">&times;</span>
        <h2>🎓 Student Focus Analysis Report</h2>
        
        <!-- final session charts inside the modal -->
        <div class="modal-charts-grid">
            <div class="modal-chart-card">
                <canvas id="reportAttentionChart"></canvas>
            </div>
            <div class="modal-chart-card">
                <canvas id="reportEmotionChart"></canvas>
            </div>
        </div>

        <div id="reportContent" class="report-content">
            <!-- AI report text will be loaded here -->
        </div>
        
        <button onclick="closeReport()" class="close-modal-btn">
            Close Report
        </button>
    </div>
</div>

</body>

</html>
