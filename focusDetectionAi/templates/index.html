<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Focus Monitor Pro</title>

<link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard.css') }}">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script defer src="{{ url_for('static', filename='js/dashboard.js') }}"></script>

</head>

<body>

<div class="container">

    <!-- =========================
         SIDEBAR
    ========================== -->

    <div class="sidebar">

        <h1>🧠 Focus Monitor</h1>

        <div id="status" class="status">
            Loading...
        </div>

        <!-- ===================== -->
        <!-- METRICS -->
        <!-- ===================== -->

        <div class="metrics-grid">

            <div class="card">
                <h3>Attention</h3>
                <div class="attention-number">
                    <span id="attention">0</span>%
                </div>
            </div>

            <div class="card">
                <h3>Emotion</h3>
                <div class="big-text" id="emotion">-</div>
            </div>

            <div class="card">
                <h3>Focus Time</h3>
                <div class="big-text">
                    <span id="focusTime">0</span>s
                </div>
            </div>

            <div class="card">
                <h3>Away Time</h3>
                <div class="big-text">
                    <span id="awayTime">0</span>s
                </div>
            </div>

        </div>

        <!-- ===================== -->
        <!-- STATUS MESSAGE -->
        <!-- ===================== -->

        <div class="message-card">

            <h3>Status</h3>

            <div id="message">-</div>

        </div>

        <!-- ===================== -->
        <!-- ALERT SETTINGS -->
        <!-- ===================== -->

        <div class="message-card">

            <h3>🔔 Alert Settings</h3>

            <label>Alert me after</label>

            <select id="alertTime">

                <option value="30" selected>30 seconds</option>
                <option value="60">1 minute</option>
                <option value="300">5 minutes</option>
                <option value="600">10 minutes</option>
                <option value="custom">Custom</option>

            </select>

            <input
                type="number"
                id="customAlert"
                placeholder="Seconds"
                min="1"
            >

            <label class="checkbox-row">

                <input type="checkbox" id="enableAlert" checked>

                Enable sound alert

            </label>

            <div id="alertStatus" class="alert-status">
                🟢 Monitoring...
            </div>

        </div>

        <!-- ===================== -->
        <!-- CONTROLS -->
        <!-- ===================== -->

        <button onclick="toggleCamera()">
            ⏸ Pause / Resume
        </button>

        <button onclick="resetStats()">
            🔄 Reset
        </button>

    </div>

    <!-- =========================
         MAIN
    ========================== -->

    <div class="main">

        <img src="/video_feed" class="video">

        <!-- ===================== -->
        <!-- CHARTS -->
        <!-- ===================== -->

        <div class="charts-grid">

            <div class="chart-card">
                <canvas id="attentionChart"></canvas>
            </div>

            <div class="chart-card">
                <canvas id="emotionChart"></canvas>
            </div>

        </div>

    </div>

</div>

</body>

</html>
